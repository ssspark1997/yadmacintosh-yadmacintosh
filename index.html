<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YAD MACINTOSH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
font-family:'Inter',sans-serif;
background:#000;
overflow:hidden;
}

.hero{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
display:block;
filter:brightness(0.85);
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,0.55),
rgba(0,0,0,0.05)
);
}

.logo{
position:absolute;
top:28px;
left:28px;
z-index:10;
color:#fff;
font-size:14px;
font-weight:700;
letter-spacing:0.18em;
text-transform:uppercase;
}

.info{
position:absolute;
left:28px;
bottom:28px;
z-index:10;
color:white;
}

.meta{
font-size:12px;
letter-spacing:0.12em;
text-transform:uppercase;
opacity:.8;
margin-bottom:10px;
}

.title{
font-size:54px;
font-weight:600;
line-height:1;
max-width:800px;
}

@media (max-width:768px){

.logo{
top:18px;
left:18px;
font-size:12px;
}

.info{
left:18px;
bottom:18px;
}

.title{
font-size:34px;
}

}

</style>
</head>

<body>

<div class="hero">

<img src="moneky.jpg" alt="YAD MACINTOSH">

<div class="overlay"></div>

<div class="logo">
YAD MACINTOSH
</div>

<div class="info">

<div class="meta">
ISSUE 01 / INDEPENDENT MAGAZINE
</div>

<div class="title">
YAD MACINTOSH
</div>

</div>

</div>

</body>
</html>
