<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGAZINE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: black;
    }

    body {
      position: relative;
    }

    /* 전체 화면 이미지 */
    .hero {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(104%) brightness(0.92);
    }

    /* 어두운 오버레이 */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    /* 좌측 상단 로고 */
    .logo {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;

      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;

      color: white;
    }

    /* 하단 텍스트 */
    .info {
      position: absolute;
      left: 24px;
      bottom: 24px;
      z-index: 10;
      color: white;
    }

    .meta {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .title {
      font-size: 38px;
      line-height: 1;
      font-weight: 500;
      max-width: 500px;
    }

    /* 모바일 */
    @media (max-width: 768px) {

      .logo {
        top: 18px;
        left: 18px;
      }

      .info {
        left: 18px;
        bottom: 18px;
      }

      .title {
        font-size: 28px;
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="logo">
    YOUR MAGAZINE
  </div>

  <main class="hero">

    <img
      src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop"
      alt=""
    >

    <div class="overlay"></div>

    <div class="info">
      <div class="meta">
        Issue 01 / Visual Essay
      </div>

      <div class="title">
        Concrete Summer
      </div>
    </div>

  </main>

</body>
</html>
